<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGS Proxy - Real Decrypted Data</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .badge {
            display: inline-block;
            background: #10b981;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        
        .controls {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .input-group {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        
        .input-field {
            flex: 1;
            min-width: 200px;
        }
        
        .input-field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .input-field input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .input-field input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .response-area {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            color: #666;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }
        
        .status {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }
        
        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.5;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            flex: 1;
            text-align: center;
        }
        
        .stat-card .number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-card .label {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .button-group button { flex: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 KGS Proxy API</h1>
            <p>Real Data | Auto-Decrypted | Clean JSON</p>
            <div class="badge">✨ AES-256 Decryption Enabled</div>
        </div>
        
        <div class="controls">
            <div class="button-group">
                <button onclick="fetchCourses()">📚 Get All Courses</button>
                <button onclick="fetchSubjects(357)">📖 Get Subjects (ID: 357)</button>
                <button onclick="fetchLessons(2737)">🎬 Get Lessons (ID: 2737)</button>
            </div>
            
            <div class="input-group">
                <div class="input-field">
                    <label>🔍 Course ID for Subjects:</label>
                    <input type="number" id="courseId" placeholder="e.g., 357">
                </div>
                <button onclick="fetchSubjectsFromInput()">Get Subjects</button>
                
                <div class="input-field">
                    <label>📺 Subject ID for Lessons:</label>
                    <input type="number" id="subjectId" placeholder="e.g., 2737">
                </div>
                <button onclick="fetchLessonsFromInput()">Get Lessons</button>
            </div>
        </div>
        
        <div class="response-area">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('formatted')">📊 Formatted View</button>
                <button class="tab" onclick="switchTab('raw')">🔧 Raw JSON</button>
                <button class="tab" onclick="switchTab('stats')">📈 Statistics</button>
            </div>
            
            <div id="status"></div>
            <div id="stats" class="stats" style="display: none;"></div>
            <pre id="output">Click any button to fetch real decrypted data...</pre>
        </div>
    </div>
    
    <script>
        let currentData = null;
        
        async function fetchAPI(endpoint, options = {}) {
            const statusDiv = document.getElementById('status');
            const outputPre = document.getElementById('output');
            
            statusDiv.className = 'status info';
            statusDiv.innerHTML = '<span class="loading"></span> Fetching real data & decrypting...';
            outputPre.textContent = 'Loading and decrypting data...';
            
            try {
                const response = await fetch(endpoint, options);
                const data = await response.json();
                
                if (data.success) {
                    currentData = data;
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `✅ Success! Fetched ${data.metadata?.totalItems || data.count || Object.keys(data).length} items in ${new Date(data.metadata?.timestamp).toLocaleTimeString()}`;
                    
                    // Show formatted view
                    showFormattedView(data);
                    
                    // Update stats
                    updateStats(data);
                } else {
                    throw new Error(data.error || 'Unknown error');
                }
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `❌ Error: ${error.message}`;
                outputPre.textContent = error.stack;
                currentData = null;
            }
        }
        
        function showFormattedView(data) {
            const outputPre = document.getElementById('output');
            let formatted = '';
            
            if (data.courses) {
                formatted = formatCourses(data.courses);
            } else if (data.subjects) {
                formatted = formatSubjects(data.subjects);
            } else if (data.lessons) {
                formatted = formatLessons(data.lessons);
            } else if (data.data) {
                if (Array.isArray(data.data)) {
                    if (data.data[0]?.name && !data.data[0]?.video_url) {
                        formatted = formatSubjects(data.data);
                    } else if (data.data[0]?.video_url) {
                        formatted = formatLessons(data.data);
                    } else {
                        formatted = formatCourses(data.data);
                    }
                }
            } else {
                formatted = JSON.stringify(data, null, 2);
            }
            
            outputPre.textContent = formatted;
        }
        
        function formatCourses(courses) {
            let output = '📚 AVAILABLE COURSES\n';
            output += '═'.repeat(60) + '\n\n';
            
            courses.forEach((course, index) => {
                output += `${index + 1}. ${course.title}\n`;
                output += `   ID: ${course.id}\n`;
                if (course.image) output += `   Image: ${course.image}\n`;
                output += `   ${'─'.repeat(50)}\n`;
            });
            
            output += `\n📊 Total: ${courses.length} courses\n`;
            return output;
        }
        
        function formatSubjects(subjects) {
            let output = '📖 SUBJECTS\n';
            output += '═'.repeat(60) + '\n\n';
            
            subjects.forEach((subject, index) => {
                output += `${index + 1}. ${subject.name}\n`;
                output += `   ID: ${subject.id}\n`;
                if (subject.videos) output += `   Videos: ${subject.videos}\n`;
                output += `   ${'─'.repeat(50)}\n`;
            });
            
            output += `\n📊 Total: ${subjects.length} subjects\n`;
            return output;
        }
        
        function formatLessons(lessons) {
            let output = '🎬 LESSONS & VIDEOS\n';
            output += '═'.repeat(60) + '\n\n';
            
            lessons.forEach((lesson, index) => {
                output += `${index + 1}. ${lesson.name}\n`;
                if (lesson.video_url) output += `   🎥 Video: ${lesson.video_url}\n`;
                if (lesson.hd_video_url) output += `   📺 HD: ${lesson.hd_video_url}\n`;
                if (lesson.pdfs?.url) output += `   📄 PDF: ${lesson.pdfs.url}\n`;
                output += `   ${'─'.repeat(50)}\n`;
            });
            
            output += `\n📊 Total: ${lessons.length} items\n`;
            return output;
        }
        
        function updateStats(data) {
            const statsDiv = document.getElementById('stats');
            let stats = '';
            
            if (data.courses) {
                stats = `
                    <div class="stat-card"><div class="number">${data.courses.length}</div><div class="label">Total Courses</div></div>
                    <div class="stat-card"><div class="number">${data.courses.filter(c => c.image).length}</div><div class="label">With Images</div></div>
                `;
            } else if (data.subjects) {
                const totalVideos = data.subjects.reduce((sum, s) => sum + (s.videos || 0), 0);
                stats = `
                    <div class="stat-card"><div class="number">${data.subjects.length}</div><div class="label">Total Subjects</div></div>
                    <div class="stat-card"><div class="number">${totalVideos}</div><div class="label">Total Videos</div></div>
                `;
            } else if (data.lessons) {
                const videos = data.lessons.filter(l => l.video_url).length;
                const pdfs = data.lessons.filter(l => l.pdfs?.url).length;
                stats = `
                    <div class="stat-card"><div class="number">${data.lessons.length}</div><div class="label">Total Items</div></div>
                    <div class="stat-card"><div class="number">${videos}</div><div class="label">Videos</div></div>
                    <div class="stat-card"><div class="number">${pdfs}</div><div class="label">PDF Notes</div></div>
                `;
            }
            
            if (stats) {
                statsDiv.innerHTML = stats;
                statsDiv.style.display = 'flex';
            }
        }
        
        function switchTab(tab) {
            const formattedView = document.getElementById('output');
            const statsDiv = document.getElementById('stats');
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'formatted') {
                if (currentData) showFormattedView(currentData);
                statsDiv.style.display = 'none';
                formattedView.style.display = 'block';
            } else if (tab === 'raw') {
                formattedView.textContent = JSON.stringify(currentData, null, 2);
                statsDiv.style.display = 'none';
                formattedView.style.display = 'block';
            } else if (tab === 'stats') {
                statsDiv.style.display = 'flex';
                formattedView.style.display = 'none';
            }
        }
        
        // API Functions
        function fetchCourses() {
            fetchAPI('/api/courses');
        }
        
        function fetchSubjects(id) {
            fetchAPI(`/api/subjects/${id}`);
        }
        
        function fetchLessons(id) {
            fetchAPI(`/api/lessons/${id}`);
        }
        
        function fetchSubjectsFromInput() {
            const id = document.getElementById('courseId').value;
            if (!id) return alert('Please enter a Course ID');
            fetchSubjects(id);
        }
        
        function fetchLessonsFromInput() {
            const id = document.getElementById('subjectId').value;
            if (!id) return alert('Please enter a Subject ID');
            fetchLessons(id);
        }
    </script>
</body>
</html>

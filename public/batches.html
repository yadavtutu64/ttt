<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGS Free Batches</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #1a237e;
            --primary-light: #3f51b5;
            --accent: #ffb300;
            --bg1: #f8faff;
            --bg2: #fff8e1;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-color: #222;
            --shadow-light: rgba(0, 0, 0, 0.05);
            --shadow-strong: rgba(0, 0, 0, 0.2);
            --radius: 16px;
            --header-height: 80px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, var(--bg1), var(--bg2), #ffeb99, #fdd835);
            background-size: 100% 400%;
            animation: gradientFlow 8s ease-in-out infinite alternate;
            color: var(--text-color);
            min-height: 100vh;
        }
        
        @keyframes gradientFlow {
            0% { background-position: 0% 0%; }
            100% { background-position: 0% 100%; }
        }
        
        .common-header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.95rem 1.2rem;
            min-height: var(--header-height);
            background: linear-gradient(90deg, var(--primary-dark), var(--primary-light));
            color: #fff;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 15px var(--shadow-strong);
        }
        
        .back-button {
            position: absolute;
            left: 1rem;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }
        
        .back-button:hover {
            background: #fbc02d;
            transform: translateY(-2px);
        }
        
        .header-title {
            font-size: clamp(1.35rem, 3.2vw, 2rem);
            font-weight: 900;
            background: linear-gradient(90deg, #fff, #ffd54f, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
            text-align: center;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            margin: 1.5rem auto;
            width: 90%;
            max-width: 600px;
        }
        
        .search-input {
            width: 100%;
            padding: 14px 22px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            transition: 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            box-shadow: 0 4px 20px var(--accent);
            transform: scale(1.02);
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer;
        }
        
        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 12px 30px rgba(255, 183, 77, 0.5);
        }
        
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 3px solid #ffd54f;
        }
        
        .card-content {
            padding: 18px;
        }
        
        .card-content h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a237e;
            margin-bottom: 6px;
        }
        
        .card-content p {
            font-size: 0.9rem;
            color: #444;
            margin-bottom: 12px;
        }
        
        .btn-fav {
            padding: 8px 16px;
            border: 2px solid var(--primary-dark);
            background: transparent;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .btn-fav.active {
            background: linear-gradient(90deg, #ffd54f, #ffb300);
            color: #1a237e;
            border: none;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #1a237e;
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: #d32f2f;
        }
        
        @media (max-width: 600px) {
            .common-header { min-height: 70px; }
            .header-title { font-size: clamp(1.15rem, 5vw, 1.5rem); }
            .card img { height: 160px; }
        }
    </style>
</head>
<body>
    <header class="common-header">
        <a href="/" class="back-button">
            <span class="material-icons">arrow_back</span>
            Home
        </a>
        <h1 class="header-title">KGS Free Batches</h1>
    </header>
    
    <div class="controls">
        <input type="text" id="search" class="search-input" placeholder="🔍 Search batches..." oninput="filterBatches()">
    </div>
    
    <div class="grid-container" id="batchesGrid"></div>
    
    <script>
        let allBatches = [];
        
        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem('favouriteCourses') || '[]');
            } catch {
                return [];
            }
        }
        
        function saveFavorites(favs) {
            localStorage.setItem('favouriteCourses', JSON.stringify(favs));
        }
        
        function isFav(id) {
            return getFavorites().some(f => String(f.id) === String(id));
        }
        
        function toggleFav(batch, event) {
            event.stopPropagation();
            let favs = getFavorites();
            const exists = favs.some(f => String(f.id) === String(batch.id));
            
            if (exists) {
                favs = favs.filter(f => String(f.id) !== String(batch.id));
            } else {
                favs.push(batch);
            }
            
            saveFavorites(favs);
            renderBatches(allBatches);
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return 'Date TBA';
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
            } catch {
                return 'Date TBA';
            }
        }
        
        function renderBatches(batches) {
            const grid = document.getElementById('batchesGrid');
            
            if (!batches || batches.length === 0) {
                grid.innerHTML = '<div class="loading">📭 No batches found. Try a different search.</div>';
                return;
            }
            
            grid.innerHTML = batches.map(batch => `
                <div class="card" onclick="viewBatch(${batch.id})">
                    <img src="${batch.image_large || 'https://via.placeholder.com/300x180?text=No+Image'}" 
                         onerror="this.src='https://via.placeholder.com/300x180?text=No+Image'"
                         alt="${batch.title || 'Batch'}">
                    <div class="card-content">
                        <h3>${batch.title || 'Untitled Batch'}</h3>
                        <p>${batch.description || batch.subtitle || 'No description available'}</p>
                        <p>📅 Start: ${formatDate(batch.start_at)}</p>
                        <button class="btn-fav ${isFav(batch.id) ? 'active' : ''}" onclick="toggleFav(${JSON.stringify(batch).replace(/"/g, '&quot;')}, event)">
                            ${isFav(batch.id) ? '★ Favorited' : '☆ Add to Favorites'}
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function filterBatches() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = allBatches.filter(batch => 
                (batch.title || '').toLowerCase().includes(query) ||
                (batch.description || '').toLowerCase().includes(query)
            );
            renderBatches(filtered);
        }
        
        function viewBatch(id) {
            window.location.href = `/batch.html?id=${id}`;
        }
        
        async function loadBatches() {
            const grid = document.getElementById('batchesGrid');
            grid.innerHTML = '<div class="loading"><div class="loading-spinner"></div> Loading batches...</div>';
            
            try {
                const response = await fetch('/api/batches');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                allBatches = await response.json();
                
                if (!Array.isArray(allBatches)) {
                    throw new Error('Invalid response format');
                }
                
                renderBatches(allBatches);
                
            } catch (error) {
                console.error('Error loading batches:', error);
                grid.innerHTML = `<div class="error">❌ Failed to load batches: ${error.message}<br><button onclick="location.reload()" style="margin-top: 10px; padding: 8px 16px; background: #1a237e; color: white; border: none; border-radius: 8px; cursor: pointer;">Retry</button></div>`;
            }
        }
        
        window.addEventListener('DOMContentLoaded', loadBatches);
    </script>
</body>
</html>
